<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        h1 { color: #333; }
        .section { margin-bottom: 40px; border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .badge-confirmed { background: #28a745; color: white; padding: 3px 8px; border-radius: 3px; font-size: 0.9em; }
        .badge-cancelled { background: #dc3545; color: white; padding: 3px 8px; border-radius: 3px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Admin Dashboard</h1>

    <div class="section" id="bookings-section">
        <h2>Bookings</h2>
        <table id="bookings-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Phone</th>
                    <th>Party Size</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>

    <div class="section" id="menu-section">
        <h2>Menu Management</h2>
        <div class="form-group">
            <textarea id="config-editor" rows="20" style="width: 100%; font-family: monospace;"></textarea>
        </div>
        <button onclick="saveConfig()">Save Configuration</button>
        <p id="config-status"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
